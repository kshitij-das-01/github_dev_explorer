<!-- Main HTML structure for GitHub Developer Explorer -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Developer Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Sticky header with title and theme toggle -->
  <header class="app-header">
    <div class="header-inner">
      <h1>GitHub Developer Explorer</h1>
      <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme">🌙</button>
    </div>
  </header>

  <main>
    <!-- Search bar and trigger buttons -->
    <section class="search-section">
      <input type="text" id="search-input" placeholder="Enter GitHub username" aria-label="GitHub username">
      <button id="search-btn">Search</button>
      <button id="clear-btn" class="btn-secondary">Clear</button>
    </section>

    <!-- Loading indicator (hidden by default) -->
    <div id="loading-spinner" class="hidden">Loading...</div>
    <!-- Error display area (hidden by default) -->
    <div id="error-message" class="hidden"></div>

    <!-- Skeleton screens shown while fetching data -->
    <div id="skeleton-profile" class="skeleton-card hidden">
      <div class="skeleton-row">
        <div class="skeleton-avatar skeleton-pulse"></div>
        <div class="skeleton-lines">
          <div class="skeleton-line skeleton-pulse w-50"></div>
          <div class="skeleton-line skeleton-pulse w-30"></div>
          <div class="skeleton-line skeleton-pulse w-70"></div>
        </div>
      </div>
    </div>
    <div id="skeleton-repos" class="skeleton-card hidden">
      <div class="skeleton-line skeleton-pulse w-40"></div>
      <div class="skeleton-line skeleton-pulse w-90"></div>
      <div class="skeleton-line skeleton-pulse w-80"></div>
      <div class="skeleton-line skeleton-pulse w-60"></div>
    </div>

    <!-- Dashboard grid for results -->
    <div class="dashboard-grid">
      <div>
        <!-- Placeholder for fetched user profile data -->
        <section id="profile-container"></section>
        <!-- Language breakdown section -->
        <section id="lang-stats-container" class="hidden"></section>
      </div>
      <div>
        <!-- Quick stats panel -->
        <section id="quick-stats" class="hidden"></section>
        <!-- Placeholder for fetched repository list -->
        <section id="repo-container"></section>
      </div>
    </div>
  </main>

  <!-- Chart.js for data visualizations -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <!-- API service layer (loaded first so main.js can use it) -->
  <script src="src/js/api.js"></script>
  <!-- Data transformation utilities -->
  <script src="src/js/stats.js"></script>
  <!-- Entry point for all JavaScript logic -->
  <script src="src/js/main.js"></script>
</body>
</html>
